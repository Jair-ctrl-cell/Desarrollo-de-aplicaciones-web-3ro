<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestor de Registros</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Estilo extra -->
  <style>
    body {
      background: linear-gradient(135deg, #e3f2fd, #f8f9fa);
      min-height: 100vh;
    }

    .app-header {
      background: #0d6efd;
      color: white;
      padding: 20px;
      border-radius: 12px;
    }

    .card-custom {
      border: none;
      border-radius: 12px;
      transition: transform 0.2s;
    }

    .card-custom:hover {
      transform: scale(1.03);
    }

    .shadow-soft {
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .badge {
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="container py-4">

  <!-- HEADER -->
  <div class="app-header text-center shadow-soft mb-4">
    <h2>📋 Sistema de Registro Dinámico</h2>
    <p class="mb-0">Semana 5 - Manipulación del DOM con JavaScript</p>
  </div>

  <div class="row">

    <!-- FORMULARIO -->
    <div class="col-lg-4 mb-4">

      <div class="card shadow-soft p-3 card-custom">
        <h5 class="mb-3">➕ Nuevo Registro</h5>

        <form id="formRegistro">

          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" id="nombre" class="form-control" placeholder="Ej: Juan Pérez">
          </div>

          <div class="mb-3">
            <label class="form-label">Descripción</label>
            <input type="text" id="descripcion" class="form-control" placeholder="Ej: Estudiante de medicina">
          </div>

          <div class="mb-3">
            <label class="form-label">Categoría</label>
            <input type="text" id="categoria" class="form-control" placeholder="Ej: Estudiante">
          </div>

          <button class="btn btn-primary w-100">
            Guardar Registro
          </button>
        </form>

        <div id="mensaje" class="mt-3"></div>

      </div>
    </div>

    <!-- LISTA -->
    <div class="col-lg-8">

      <!-- CONTADOR -->
      <div class="alert alert-primary shadow-soft">
        Total de registros: <strong id="contador">0</strong>
      </div>

      <!-- CARDS -->
      <div id="listaRegistros" class="row g-3"></div>

    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
